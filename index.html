<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0D; --card:#131318; --card2:#1A1A21;
  --line:#242430; --line2:#31313E;
  --tx:#F4F4F6; --tx2:#9A9AA8; --tx3:#63636F;
  --gold:#D9B36C; --goldbg:#3A2F1C;
  --mint:#7BE0A8; --mintbg:#12291F;
  --amber:#F0B44A; --amberbg:#2E2413;
  --rose:#FF8080; --rosebg:#2E1717;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--tx)}
body{font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(84px + env(safe-area-inset-bottom))}

.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;
  justify-content:space-between;gap:12px;padding:9px 16px;
  background:rgba(10,10,13,.85);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px}
.mark{width:22px;height:22px;border-radius:7px;flex:none;
  background:linear-gradient(140deg,var(--gold),#8C6B32);display:grid;
  place-items:center;font-family:Sora,sans-serif;font-size:11px;
  font-weight:600;color:#1A1408}
.brand b{font-family:Sora,sans-serif;font-size:12.5px;font-weight:500;
  letter-spacing:.18em;text-transform:uppercase}
.pending{display:flex;align-items:baseline;gap:6px;flex:none;padding:5px 11px;
  border-radius:100px;background:var(--goldbg);border:1px solid #4E3F24}
.pending b{font-family:Sora,sans-serif;font-size:14px;font-weight:600;
  color:var(--gold);line-height:1}
.pending span{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#A98A50}

.rail{display:flex;gap:5px;padding:13px 16px 0;max-width:1120px;margin:0 auto}
.rail i{flex:1;height:3px;border-radius:2px;background:var(--line2);transition:background .25s}
.rail i.done{background:#4A4A5A}
.rail i.now{background:var(--gold)}

.shell{max-width:1120px;margin:0 auto;padding:16px}

.who{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.pic{width:42px;height:42px;border-radius:14px;flex:none;background:var(--card2);
  border:1px solid var(--line2);display:grid;place-items:center;
  font-family:Sora,sans-serif;font-size:14px;font-weight:600;color:var(--gold)}
.whotx{min-width:0;flex:1}
.name{font-family:Sora,sans-serif;font-size:18px;font-weight:600;
  letter-spacing:-.01em;margin:0;line-height:1.3}
.role{font-size:12.5px;color:var(--tx2);margin:2px 0 0;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.meta{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
.when{font-size:11.5px;color:var(--tx3)}
.rel{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;
  border-radius:100px;font-size:11px;background:var(--card2);
  border:1px solid var(--line2);color:var(--tx2)}
.rel b{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold)}
.dots{display:flex;gap:1.5px}
.dots i{width:3px;height:3px;border-radius:50%;background:var(--line2)}
.dots i.on{background:var(--gold)}

.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:900px){
  .grid{grid-template-columns:minmax(0,504px) minmax(0,1fr);gap:22px;align-items:start}
  .right{position:sticky;top:68px}
}

.panel{background:var(--card);border:1px solid var(--line);
  border-radius:18px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:13px 16px;border-bottom:1px solid var(--line)}
.ph span{font-family:Sora,sans-serif;font-size:10.5px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:var(--tx3)}
.pb{padding:16px}
.framewrap{padding:10px;background:var(--card2)}
.frame{width:100%;border:0;display:block;background:var(--card2);border-radius:10px}
.why{font-size:14.5px;margin:0}

textarea{width:100%;min-height:132px;resize:vertical;display:block;padding:14px;
  border-radius:14px;border:1px solid var(--line2);background:var(--card2);
  color:var(--tx);font-family:Inter,sans-serif;font-size:15px;line-height:1.65}
textarea::placeholder{color:var(--tx3)}
textarea:focus{outline:none;border-color:var(--gold);background:#1E1E26}
.cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3)}
.cnt.over{color:var(--rose)}

.post{font-size:14.5px;white-space:pre-wrap;color:var(--tx2);max-height:0;
  overflow:hidden;transition:max-height .3s ease}
.post.open{max-height:2600px}
.toggle{width:100%;background:none;border:0;cursor:pointer;padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  font-family:Sora,sans-serif;font-size:10.5px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:var(--tx3)}
.toggle b{font-size:15px;color:var(--gold);transition:transform .3s;line-height:1}
.toggle.open b{transform:rotate(45deg)}

.urn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);
  word-break:break-all;padding:12px 16px;border-top:1px solid var(--line)}

.bar{position:fixed;left:0;right:0;bottom:0;z-index:50;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  background:rgba(10,10,13,.92);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line)}
.barin{max-width:1120px;margin:0 auto;display:flex;gap:8px}
.btn{font-family:Sora,sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;
  border-radius:13px;border:1px solid transparent;padding:13px 14px;display:flex;
  align-items:center;justify-content:center;white-space:nowrap;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.bgo{flex:1;background:var(--mint);color:#062015;font-weight:600}
.bre{background:var(--amberbg);color:var(--amber);border-color:#4A3A18}
.bno{background:var(--rosebg);color:var(--rose);border-color:#4A2020}
.bsk{background:var(--card2);color:var(--tx2);border-color:var(--line2)}
@media(max-width:560px){.btn{padding:12px 10px;font-size:12.5px;border-radius:12px}}

.flash{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(86px + env(safe-area-inset-bottom));z-index:60;padding:11px 18px;
  border-radius:100px;font-family:Sora,sans-serif;font-size:13px;
  background:var(--card2);border:1px solid var(--line2);opacity:0;
  pointer-events:none;transition:opacity .25s,transform .25s;
  max-width:calc(100vw - 32px)}
.flash.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

.fin{text-align:center;padding:56px 20px}
.fin h2{font-family:Sora,sans-serif;font-size:26px;font-weight:600;
  margin:0 0 8px;letter-spacing:-.02em}
.fin p{color:var(--tx2);margin:0 auto;max-width:340px}
.tick{width:56px;height:56px;border-radius:50%;margin:0 auto 20px;
  background:var(--mintbg);border:1px solid #235C40;color:var(--mint);
  display:grid;place-items:center;font-size:26px}

.drawer{max-width:1120px;margin:8px auto 0;padding:0 16px}
.dtog{width:100%;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;
  justify-content:space-between;align-items:center;font-family:Sora,sans-serif;
  font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2)}
.dtog b{color:var(--gold);font-family:'JetBrains Mono',monospace;letter-spacing:0}
.dlist{max-height:0;overflow:hidden;transition:max-height .3s ease}
.dlist.open{max-height:1400px}
.drow{background:var(--card);border:1px solid var(--line);
  border-left:2px solid var(--rose);border-radius:12px;padding:14px 16px;margin-top:8px}
.drow p{margin:0}
.dn{font-family:Sora,sans-serif;font-size:15px;font-weight:500}
.dr{font-size:13px;color:var(--tx2);margin-top:4px}
.undo{margin-top:11px;background:none;border:1px solid var(--line2);
  color:var(--tx);border-radius:10px;padding:8px 13px;cursor:pointer;
  font-family:Sora,sans-serif;font-size:12px}
.undo:hover{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><div class="mark">S</div><b>Review</b></div>
  <div class="pending"><b id="pcount">0</b><span>to review</span></div>
</div>

<div class="rail" id="rail"></div>
<div class="shell" id="stage"></div>
<div class="drawer" id="drawer"></div>

<div class="bar" id="bar" hidden>
  <div class="barin">
    <button class="btn bgo" data-a="approved">Approve &amp; post</button>
    <button class="btn bre" data-a="rewrite">Rewrite</button>
    <button class="btn bno" data-a="declined">Don't</button>
    <button class="btn bsk" data-a="later">Later</button>
  </div>
</div>

<div class="flash" id="flash"></div>

<script>
/* Live wiring, swap in when Apps Script is ready:
   const FEED = 'https://script.google.com/macros/s/AKfycby.../exec?action=list';
   const SEND = 'https://script.google.com/macros/s/AKfycby.../exec';   */

var POSTS = [{
  id:1,
  author:"Sanchit Govil",
  role:"Co-Founder, Lal10 \u00b7 Operator at the intersection of fashion, supply chain and capital \u00b7 Forbes 30U30",
  when:"4 days ago",
  shareUrn:"urn:li:share:7483757000162652160",
  activityUrn:"urn:li:activity:7483757003551432704",
  embedHeight:1403,
  relevance:9,
  reason:"An operating story about digitising a fragmented supply chain, and why delivery beats the pitch. Close to frontline execution and adoption work.",
  draft:"The 11 PM warehouse line is where delivery beats pitch, we saw that in telecom distribution too, where trust in data is hard to establish",
  text:"PhonePe. Groww. Myntra. Curefit. Meesho.\nOver 200 startups. $25 billion in combined valuation. Six unicorns. Every founder once sat in the same building.\n\nSilicon Valley calls its version the PayPal Mafia. India built its own - quieter, less mythologised, just as real. Call it the Flipkart Mafia.\n\nIn 2015, I was right inside it. I joined Flipkart's Supply chain design and new initiatives team - the exact window when the company's former COO says it was deliberately hiring for one trait: audacity. Not credentials or titles.\n\nThat trait didn't stay inside Flipkart's walls. It walked out, repeatedly, and built a second ecosystem. Flipsters have started over 200 companies, raised more than $10 billion.\n\nBecause here's what nobody tells you about that culture: it doesn't produce people who chase incremental problems. It produces people allergic to them.\n\nI left Flipkart's supply chain function and spent the next eight years in India's apparel manufacturing sector - arguably the most fragmented, least-digitized part of the entire economy.\n\nHere, The pitch is not the win. The delivery is the win. I learned that standing in a warehouse at 11 PM, rupee by rupee, watching an order either ship on time or blow a client relationship built over years.\n\nFlipkart taught me to build systems where none existed.\n\nLal10 is that same instinct, pointed at a $47 billion problem nobody wanted to touch: India's apparel manufacturing supply chain, still running on phone calls, WhatsApp, and trust built over decades - not data.\n\nSame audacity put in a Different warehouse."
}];

var FILTERED = [{
  id:2,
  author:"Rishabh Kumar",
  when:"13 hours ago",
  shareUrn:"urn:li:share:7484991797128085504",
  activityUrn:"urn:li:activity:7485177994400006144",
  embedHeight:626,
  reason:"One line caption on an image post. Nothing in the text to respond to, and the pipeline can't read what's in the image.",
  text:"Laptops have a new meaning now"
}];

var queue = POSTS.slice(), i = 0, decisions = [];
function $(s){ return document.querySelector(s); }
var stage=$('#stage'), rail=$('#rail'), bar=$('#bar'), flash=$('#flash');

function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function words(s){ return s.trim() ? s.trim().split(/\s+/).length : 0; }
function initials(n){ return n.split(/\s+/).slice(0,2).map(function(x){return x[0];}).join('').toUpperCase(); }

function say(m){
  flash.textContent = m;
  flash.classList.add('show');
  clearTimeout(flash._t);
  flash._t = setTimeout(function(){ flash.classList.remove('show'); }, 2100);
}

function render(){
  $('#pcount').textContent = Math.max(0, queue.length - i);
  rail.innerHTML = queue.map(function(_, n){
    return '<i class="' + (n<i?'done':n===i?'now':'') + '"></i>';
  }).join('');

  if(i >= queue.length){
    bar.hidden = true; rail.innerHTML = '';
    var ok = decisions.filter(function(d){ return d.action==='approved'; }).length;
    stage.innerHTML = '<div class="fin"><div class="tick">&#10003;</div>' +
      '<h2>Queue cleared</h2><p>' + ok + ' approved, ' + (decisions.length-ok) +
      ' held back. Next batch lands after the morning run.</p></div>';
    return;
  }

  bar.hidden = false;
  var p = queue[i], dots = '';
  for(var n=0; n<10; n++){ dots += '<i class="' + (n<p.relevance?'on':'') + '"></i>'; }

  stage.innerHTML =
    '<div class="who"><div class="pic">' + esc(initials(p.author)) + '</div>' +
      '<div class="whotx"><p class="name">' + esc(p.author) + '</p>' +
      '<p class="role">' + esc(p.role) + '</p><div class="meta">' +
      '<span class="when">' + esc(p.when) + '</span>' +
      '<span class="rel"><span class="dots">' + dots + '</span><b>' +
      p.relevance + '</b> fit</span></div></div></div>' +

    '<div class="grid"><div class="panel">' +
      '<div class="ph"><span>As it appears on LinkedIn</span></div>' +
      '<div class="framewrap"><iframe class="frame" title="Post by ' + esc(p.author) +
      '" style="height:' + p.embedHeight + 'px" src="https://www.linkedin.com/embed/feed/update/' +
      p.shareUrn + '"></iframe></div></div>' +

    '<div class="right"><div class="panel">' +
      '<div class="ph"><span>Why this one</span></div>' +
      '<div class="pb"><p class="why">' + esc(p.reason) + '</p></div></div>' +

    '<div class="panel" style="margin-top:16px">' +
      '<div class="ph"><span>Your comment</span><span class="cnt" id="cnt"></span></div>' +
      '<div class="pb"><textarea id="ta" aria-label="Your comment" ' +
      'placeholder="Write something worth reading.">' + esc(p.draft) + '</textarea></div>' +
      '<div class="urn">' + esc(p.activityUrn) + '</div></div>' +

    '<div class="panel" style="margin-top:16px">' +
      '<button class="toggle" id="tg"><span>Read the full post</span><b>+</b></button>' +
      '<div class="post" id="pt" style="padding:0 16px">' +
      '<div style="padding-bottom:16px">' + esc(p.text) + '</div></div></div>' +
    '</div></div>';

  var ta=$('#ta'), cnt=$('#cnt');
  function upd(){
    var w = words(ta.value);
    cnt.textContent = w + ' / 40';
    cnt.className = 'cnt' + (w>40 ? ' over' : '');
  }
  ta.addEventListener('input', upd); upd();

  var tg=$('#tg'), pt=$('#pt');
  tg.addEventListener('click', function(){
    var open = pt.classList.toggle('open');
    tg.classList.toggle('open', open);
    tg.querySelector('span').textContent = open ? 'Hide the post' : 'Read the full post';
  });

  window.scrollTo({top:0, behavior:'smooth'});
}

bar.addEventListener('click', function(e){
  var b = e.target.closest('button[data-a]');
  if(!b) return;
  var a = b.dataset.a, p = queue[i], ta = $('#ta');

  if(a === 'later'){
    queue.push(queue.splice(i,1)[0]);
    say('Moved to the back of the queue');
    render(); return;
  }

  decisions.push({urn:p.activityUrn, action:a, comment: ta ? ta.value : ''});
  say(a==='approved' ? 'Approved. Posting shortly.'
    : a==='rewrite'  ? 'Sent back for a fresh draft.'
    : 'Left alone. Nothing posted.');

  /* fetch(SEND,{method:'POST',body:JSON.stringify(decisions[decisions.length-1])}); */

  i++; render();
});

function drawDrawer(){
  var d = $('#drawer');
  if(!FILTERED.length){ d.innerHTML=''; return; }
  d.innerHTML = '<button class="dtog" id="dt"><span>Filtered out before review</span><b>' +
    FILTERED.length + '</b></button><div class="dlist" id="dl">' +
    FILTERED.map(function(f){
      return '<div class="drow"><p class="dn">' + esc(f.author) +
        ' <span style="color:var(--tx3);font-size:12px;font-weight:400">' +
        esc(f.when)
