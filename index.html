<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0D; --card:#131318; --card2:#1A1A21;
  --line:#242430; --line2:#31313E;
  --tx:#F4F4F6; --tx2:#9A9AA8; --tx3:#63636F;
  --gold:#D9B36C; --goldbg:#3A2F1C;
  --mint:#7BE0A8; --mintbg:#12291F;
  --amber:#F0B44A; --amberbg:#2E2413;
  --rose:#FF8080; --rosebg:#2E1717;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--tx)}
body{font-family:Inter,system-ui,-apple-system,sans-serif;font-size:15px;
  line-height:1.6;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(90px + env(safe-area-inset-bottom))}

.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;
  justify-content:space-between;gap:10px;padding:9px 14px;
  background:rgba(10,10,13,.85);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:8px;min-width:0}
.mark{width:22px;height:22px;border-radius:7px;flex:none;
  background:linear-gradient(140deg,#D9B36C,#8C6B32);display:grid;
  place-items:center;font-family:Sora,sans-serif;font-size:11px;
  font-weight:600;color:#1A1408}
.brand b{font-family:Sora,sans-serif;font-size:12px;font-weight:500;
  letter-spacing:.18em;text-transform:uppercase}
.pills{display:flex;gap:7px;align-items:center;flex:none}
.pill{display:flex;align-items:baseline;gap:5px;padding:5px 10px;
  border-radius:100px;border:1px solid transparent;background:none;
  font-family:inherit;cursor:default}
.pill b{font-family:Sora,sans-serif;font-size:13.5px;font-weight:600;line-height:1}
.pill span{font-size:9.5px;letter-spacing:.09em;text-transform:uppercase}
.p-gold{background:var(--goldbg);border-color:#4E3F24}
.p-gold b{color:var(--gold)} .p-gold span{color:#A98A50}
.p-rose{background:var(--rosebg);border-color:#4A2020;cursor:pointer}
.p-rose b{color:var(--rose)} .p-rose span{color:#B26565}
.p-rose:active{transform:scale(.96)}
.sync{width:28px;height:28px;border-radius:9px;cursor:pointer;flex:none;
  background:var(--card2);border:1px solid var(--line2);color:var(--tx2);
  font-size:14px;line-height:1;padding:0;display:grid;place-items:center}
.sync:hover{border-color:var(--gold);color:var(--gold)}
.sync.busy{opacity:.5;pointer-events:none}

.rail{display:flex;gap:5px;padding:13px 16px 0;max-width:1120px;margin:0 auto}
.rail i{flex:1;height:3px;border-radius:2px;background:var(--line2)}
.rail i.done{background:#4A4A5A}
.rail i.now{background:var(--gold)}

.shell{max-width:1120px;margin:0 auto;padding:16px}

.state{text-align:center;padding:60px 20px;color:var(--tx2)}
.state h3{font-family:Sora,sans-serif;font-size:18px;font-weight:500;
  color:var(--tx);margin:0 0 8px}
.state code{font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--tx3);word-break:break-all;display:block;margin-top:14px}
.retry{margin-top:18px;background:none;border:1px solid var(--line2);
  color:var(--tx);border-radius:11px;padding:10px 18px;cursor:pointer;
  font-family:Sora,sans-serif;font-size:13px}
.retry:hover{border-color:var(--gold);color:var(--gold)}

.who{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.pic{width:42px;height:42px;border-radius:14px;flex:none;background:var(--card2);
  border:1px solid var(--line2);display:grid;place-items:center;
  font-family:Sora,sans-serif;font-size:14px;font-weight:600;color:var(--gold)}
.whotx{min-width:0;flex:1}
.name{font-family:Sora,sans-serif;font-size:18px;font-weight:600;
  letter-spacing:-.01em;margin:0;line-height:1.3}
.role{font-size:12.5px;color:var(--tx2);margin:2px 0 0;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.meta{display:flex;align-items:center;gap:9px;margin-top:8px;flex-wrap:wrap}
.when{font-size:11.5px;color:var(--tx3)}

.fit{display:inline-flex;align-items:center;gap:7px;padding:3px 9px 3px 8px;
  border-radius:100px;background:var(--card2);border:1px solid var(--line2)}
.seg{display:flex;gap:2px}
.seg i{width:6px;height:11px;border-radius:2px;background:#2E2E3A;
  border:1px solid #3B3B49;display:block}
.seg i.on{border-color:transparent}
.fitn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:-.02em}
.fitn small{color:var(--tx3);font-size:10px}

.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:900px){
  .grid{grid-template-columns:minmax(0,504px) minmax(0,1fr);gap:22px;align-items:start}
  .right{position:sticky;top:66px}
}

.panel{background:var(--card);border:1px solid var(--line);
  border-radius:18px;overflow:hidden;margin-bottom:16px}
.panel:last-child{margin-bottom:0}
.ph{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:11px 14px;border-bottom:1px solid var(--line)}
.ph > span{font-family:Sora,sans-serif;font-size:10.5px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:var(--tx3)}
.pb{padding:16px}

.size{display:flex;align-items:center;gap:6px}
.size button{width:26px;height:26px;border-radius:8px;cursor:pointer;
  background:var(--card2);border:1px solid var(--line2);color:var(--tx2);
  font-family:Sora,sans-serif;font-size:14px;line-height:1;padding:0;
  display:grid;place-items:center}
.size button:hover{border-color:var(--gold);color:var(--gold)}
.size em{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);
  font-style:normal;min-width:34px;text-align:center}

.framewrap{padding:10px;background:var(--card2)}
.frame{width:100%;border:0;display:block;background:var(--card2);border-radius:10px}
.why{font-size:14.5px;margin:0}

textarea{width:100%;min-height:132px;resize:vertical;display:block;padding:14px;
  border-radius:14px;border:1px solid var(--line2);background:var(--card2);
  color:var(--tx);font-family:Inter,sans-serif;font-size:15px;line-height:1.65}
textarea:focus{outline:none;border-color:var(--gold);background:#1E1E26}
.cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3)}
.cnt.over{color:var(--rose)}

.post{font-size:14.5px;white-space:pre-wrap;color:var(--tx2);display:none;
  padding:0 16px 16px}
.post.open{display:block}
.toggle{width:100%;background:none;border:0;cursor:pointer;padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  font-family:Sora,sans-serif;font-size:10.5px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:var(--tx3)}
.toggle b{font-size:15px;color:var(--gold);line-height:1}

.urn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);
  word-break:break-all;padding:12px 16px;border-top:1px solid var(--line)}

.bar{position:fixed;left:0;right:0;bottom:0;z-index:50;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  background:rgba(10,10,13,.92);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line)}
.barin{max-width:1120px;margin:0 auto;display:flex;gap:8px}
.btn{font-family:Sora,sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;
  border-radius:13px;border:1px solid transparent;padding:13px 14px;display:flex;
  align-items:center;justify-content:center;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;pointer-events:none}
.bgo{flex:1;background:var(--mint);color:#062015;font-weight:600}
.bre{background:var(--amberbg);color:var(--amber);border-color:#4A3A18}
.bno{background:var(--rosebg);color:var(--rose);border-color:#4A2020}
.bsk{background:var(--card2);color:var(--tx2);border-color:var(--line2)}
@media(max-width:560px){.btn{padding:12px 10px;font-size:12.5px;border-radius:12px}}

.flash{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(92px + env(safe-area-inset-bottom));z-index:60;padding:11px 18px;
  border-radius:100px;font-family:Sora,sans-serif;font-size:13px;
  background:var(--card2);border:1px solid var(--line2);opacity:0;
  pointer-events:none;transition:opacity .25s;max-width:calc(100vw - 32px)}
.flash.show{opacity:1}
.flash.bad{border-color:#4A2020;color:var(--rose)}

.fin{text-align:center;padding:56px 20px}
.fin h2{font-family:Sora,sans-serif;font-size:26px;font-weight:600;
  margin:0 0 8px;letter-spacing:-.02em}
.fin p{color:var(--tx2);margin:0 auto;max-width:340px}
.tick{width:56px;height:56px;border-radius:50%;margin:0 auto 20px;
  background:var(--mintbg);border:1px solid #235C40;color:var(--mint);
  display:grid;place-items:center;font-size:26px}

.back{background:none;border:1px solid var(--line2);color:var(--tx2);
  border-radius:10px;padding:8px 14px;cursor:pointer;font-family:Sora,sans-serif;
  font-size:12px;margin-bottom:16px}
.back:hover{border-color:var(--gold);color:var(--gold)}
.rtitle{font-family:Sora,sans-serif;font-size:20px;font-weight:600;
  margin:0 0 4px;letter-spacing:-.01em}
.rsub{color:var(--tx2);font-size:13.5px;margin:0 0 20px}
.rcard{background:var(--card);border:1px solid var(--line);
  border-left:2px solid var(--rose);border-radius:14px;padding:16px;margin-bottom:12px}
.rcard .rn{font-family:Sora,sans-serif;font-size:16px;font-weight:500;margin:0}
.rcard .rw{font-size:11.5px;color:var(--tx3);margin:2px 0 0}
.rcard .rr{font-size:13.5px;color:var(--tx2);margin:10px 0 0}
.rcard .rq{font-size:13.5px;color:var(--tx2);margin:10px 0 0;
  padding:10px 12px;background:var(--card2);border-radius:10px;white-space:pre-wrap}
.undo{margin-top:12px;background:none;border:1px solid var(--line2);
  color:var(--tx);border-radius:10px;padding:8px 13px;cursor:pointer;
  font-family:Sora,sans-serif;font-size:12px}
.undo:hover{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><div class="mark">S</div><b>Review</b></div>
  <div class="pills">
    <div class="pill p-gold"><b id="pcount">0</b><span>to review</span></div>
    <button class="pill p-rose" id="rejbtn"><b id="rcount">0</b><span>rejected</span></button>
    <button class="sync" id="sync" aria-label="Reload from sheet">&#8635;</button>
  </div>
</div>

<div class="rail" id="rail"></div>
<div class="shell" id="stage"></div>

<div class="bar" id="bar" style="display:none">
  <div class="barin">
    <button class="btn bgo" data-a="approved">Approve &amp; post</button>
    <button class="btn bre" data-a="rewrite">Rewrite</button>
    <button class="btn bno" data-a="rejected">Don't</button>
    <button class="btn bsk" data-a="later">Later</button>
  </div>
</div>

<div class="flash" id="flash"></div>

<script>
var ENDPOINT = 'https://script.google.com/macros/s/AKfycbx6JNaX9xRLzggDHD4tRIB6G3rPykMDM0m-P-yc2W87OTMO5ji1PgpNuubUhmL8Cpul/exec';

var queue = [];
var rejected = [];
var idx = 0;
var approvedCount = 0;
var view = 'queue';
var flashTimer;
var busy = false;

function el(id){ return document.getElementById(id); }

function esc(s){
  var d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

function countWords(s){
  var v = s.trim();
  return v ? v.split(/\s+/).length : 0;
}

function initials(n){
  var parts = String(n || '?').split(/\s+/);
  var out = '';
  for(var i = 0; i < parts.length && i < 2; i++){ out += parts[i].charAt(0); }
  return out.toUpperCase();
}

function fitColour(n){
  if(n >= 8){ return '#7BE0A8'; }
  if(n >= 5){ return '#F0B44A'; }
  return '#FF8080';
}

function say(msg, bad){
  var f = el('flash');
  f.textContent = msg;
  f.className = bad ? 'flash show bad' : 'flash show';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(function(){ f.className = 'flash'; }, 2600);
}

function counts(){
  el('pcount').textContent = Math.max(0, queue.length - idx);
  el('rcount').textContent = rejected.length;
}

function drawRail(){
  if(view !== 'queue' || !queue.length){ el('rail').innerHTML = ''; return; }
  var out = '';
  for(var i = 0; i < queue.length; i++){
    var c = i < idx ? 'done' : (i === idx ? 'now' : '');
    out += '<i class="' + c + '"></i>';
  }
  el('rail').innerHTML = out;
}

function showState(title, body, showRetry, detail){
  el('bar').style.display = 'none';
  el('rail').innerHTML = '';
  el('stage').innerHTML =
    '<div class="state"><h3>' + esc(title) + '</h3><p>' + esc(body) + '</p>' +
    (detail ? '<code>' + esc(detail) + '</code>' : '') +
    (showRetry ? '<button class="retry" id="rt">Try again</button>' : '') +
    '</div>';
  if(showRetry){
    el('rt').addEventListener('click', load);
  }
}

function load(){
  if(ENDPOINT.indexOf('PASTE_YOUR') === 0){
    showState('Not connected yet',
      'Open this file and replace ENDPOINT near the top of the script with your Apps Script /exec URL.',
      false);
    return;
  }

  showState('Loading', 'Reading the queue from your sheet.', false);

  fetch(ENDPOINT + '?action=list&t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d.ok){ throw new Error(d.error || 'Backend returned an error'); }
      queue = d.pending || [];
      rejected = d.rejected || [];
      idx = 0;
      approvedCount = 0;
      view = 'queue';
      render();
    })
    .catch(function(err){
      showState('Could not reach the sheet',
        'The dashboard loaded but the backend did not answer. Check the deployment is set to "Anyone" access.',
        true, String(err));
    });
}

function send(urn, action, comment){
  return fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ urn: urn, action: action, comment: comment })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(!d.ok){ throw new Error(d.error || 'Write failed'); }
    return d;
  });
}

function finish(){
  el('bar').style.display = 'none';
  el('rail').innerHTML = '';
  el('stage').innerHTML =
    '<div class="fin"><div class="tick">&#10003;</div><h2>Queue cleared</h2><p>' +
    approvedCount + ' approved, ' + rejected.length +
    ' sitting in rejected. Next batch lands after the morning run.</p></div>';
  window.scrollTo(0, 0);
}

function renderQueue(){
  counts();
  drawRail();

  if(!queue.length){
    showState('Nothing waiting', 'No pending rows in the sheet right now.', true);
    counts();
    return;
  }

  if(idx >= queue.length){ finish(); return; }

  el('bar').style.display = '';

  var p = queue[idx];
  var col = fitColour(p.relevance);
  var seg = '';
  for(var i = 0; i < 10; i++){
    seg += i < p.relevance
      ? '<i class="on" style="background:' + col + '"></i>'
      : '<i></i>';
  }

  el('stage').innerHTML =
    '<div class="who">' +
      '<div class="pic">' + esc(initials(p.author)) + '</div>' +
      '<div class="whotx">' +
        '<p class="name">' + esc(p.author) + '</p>' +
        '<p class="role">' + esc(p.author_headline) + '</p>' +
        '<div class="meta">' +
          '<span class="when">' + esc(p.posted_when) + '</span>' +
          '<span class="fit"><span class="seg">' + seg + '</span>' +
            '<span class="fitn" style="color:' + col + '">' + p.relevance +
            '<small>/10 fit</small></span></span>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="grid">' +
      '<div>' +
        '<div class="panel">' +
          '<div class="ph"><span>As it appears on LinkedIn</span>' +
            '<span class="size">' +
              '<button id="shrink" aria-label="Shorter">&#8722;</button>' +
              '<em id="hval">' + p.embed_height + '</em>' +
              '<button id="grow" aria-label="Taller">+</button>' +
            '</span>' +
          '</div>' +
          '<div class="framewrap">' +
            '<iframe class="frame" id="fr" title="Post by ' + esc(p.author) + '" ' +
              'style="height:' + p.embed_height + 'px" ' +
              'src="https://www.linkedin.com/embed/feed/update/' + esc(p.post_urn) + '"></iframe>' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="right">' +
        '<div class="panel">' +
          '<div class="ph"><span>Why this one</span></div>' +
          '<div class="pb"><p class="why">' + esc(p.reason) + '</p></div>' +
        '</div>' +

        '<div class="panel">' +
          '<div class="ph"><span>Your comment</span><span class="cnt" id="cnt">&nbsp;</span></div>' +
          '<div class="pb">' +
            '<textarea id="ta" aria-label="Your comment">' + esc(p.draft_comment) + '</textarea>' +
          '</div>' +
          '<div class="urn">' + esc(p.activity_urn) + '</div>' +
        '</div>' +

        '<div class="panel">' +
          '<button class="toggle" id="tg">' +
            '<span id="tgl">Read the full post</span><b id="tgi">+</b>' +
          '</button>' +
          '<div class="post" id="pt">' + esc(p.post_text) + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  var ta = el('ta');
  var cnt = el('cnt');
  function upd(){
    var n = countWords(ta.value);
    cnt.textContent = n + ' / 40';
    cnt.className = n > 40 ? 'cnt over' : 'cnt';
  }
  ta.addEventListener('input', upd);
  upd();

  function resize(delta){
    p.embed_height = Math.max(300, Number(p.embed_height) + delta);
    el('fr').style.height = p.embed_height + 'px';
    el('hval').textContent = p.embed_height;
  }
  el('grow').addEventListener('click', function(){ resize(100); });
  el('shrink').addEventListener('click', function(){ resize(-100); });

  el('tg').addEventListener('click', function(){
    var pt = el('pt');
    var open = pt.className.indexOf('open') === -1;
    pt.className = open ? 'post open' : 'post';
    el('tgl').textContent = open ? 'Hide the post' : 'Read the full post';
    el('tgi').textContent = open ? '\u2212' : '+';
  });

  window.scrollTo(0, 0);
}

function renderRejected(){
  counts();
  el('rail').innerHTML = '';
  el('bar').style.display = 'none';

  var rows = '';
  for(var i = 0; i < rejected.length; i++){
    var r = rejected[i];
    var why = r.dropped_by === 'filter'
      ? 'Dropped by the filter before it reached you.'
      : 'You decided not to comment on this one.';
    rows +=
      '<div class="rcard">' +
        '<p class="rn">' + esc(r.author) + '</p>' +
        '<p class="rw">' + esc(r.posted_when) + ' \u00b7 ' + esc(why) + '</p>' +
        '<p class="rr">' + esc(r.reason) + '</p>' +
        (r.final_comment ? '<p class="rq">' + esc(r.final_comment) + '</p>' : '') +
        '<button class="undo" data-urn="' + esc(r.activity_urn) + '">Put it back in the queue</button>' +
      '</div>';
  }

  if(!rows){ rows = '<p style="color:#9A9AA8">Nothing rejected yet.</p>'; }

  el('stage').innerHTML =
    '<button class="back" id="bk">&#8592; Back to review</button>' +
    '<p class="rtitle">Rejected</p>' +
    '<p class="rsub">Posts the filter dropped, plus the ones you passed on. ' +
      'Pull any of them back if the call was wrong.</p>' + rows;

  el('bk').addEventListener('click', function(){
    view = 'queue';
    render();
  });

  var undos = el('stage').getElementsByClassName('undo');
  for(var j = 0; j < undos.length; j++){
    undos[j].addEventListener('click', function(){
      var btn = this;
      var urn = btn.getAttribute('data-urn');
      btn.disabled = true;
      btn.textContent = 'Putting back...';
      send(urn, 'pending', '')
        .then(function(){
          say('Back in the queue');
          load();
        })
        .catch(function(err){
          btn.disabled = false;
          btn.textContent = 'Put it back in the queue';
          say('Could not update: ' + err.message, true);
        });
    });
  }

  window.scrollTo(0, 0);
}

function render(){
  if(view === 'rejected'){ renderRejected(); } else { renderQueue(); }
}

function setBusy(on){
  busy = on;
  var bs = el('bar').getElementsByTagName('button');
  for(var i = 0; i < bs.length; i++){ bs[i].disabled = on; }
}

function act(a){
  if(busy || view !== 'queue' || idx >= queue.length){ return; }
  var p = queue[idx];
  var ta = el('ta');
  var text = ta ? ta.value : '';

  if(a === 'later'){
    if(queue.length - idx < 2){ say('Nothing else waiting'); return; }
    queue.push(queue.splice(idx, 1)[0]);
    say('Moved to the back of the queue');
    renderQueue();
    return;
  }

  setBusy(true);

  send(p.activity_urn, a, text)
    .then(function(){
      if(a === 'approved'){
        approvedCount++;
        say('Approved and saved.');
      } else if(a === 'rewrite'){
        say('Marked for a rewrite.');
      } else {
        p.dropped_by = 'you';
        p.final_comment = text;
        rejected.push(p);
        say('Moved to rejected.');
      }
      idx++;
      setBusy(false);
      renderQueue();
    })
    .catch(function(err){
      setBusy(false);
      say('Not saved: ' + err.message, true);
    });
}

el('rejbtn').addEventListener('click', function(){
  view = view === 'rejected' ? 'queue' : 'rejected';
  render();
});

el('sync').addEventListener('click', function(){
  var b = this;
  b.className = 'sync busy';
  load();
  setTimeout(function(){ b.className = 'sync'; }, 1200);
});

var barButtons = el('bar').getElementsByTagName('button');
for(var b = 0; b < barButtons.length; b++){
  barButtons[b].addEventListener('click', function(){
    act(this.getAttribute('data-a'));
  });
}

load();
</script>
</body>
</html>
